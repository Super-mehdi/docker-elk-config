input {
  beats {
    port => 5046
    tags => ["winlogbeat"]
    ssl_enabled => false
  }
}

filter {
  # ─── Seulement pour les logs Windows ───
  if "winlogbeat" in [tags] {

    # Renommer le champ event.code en event_id pour plus de clarté
    mutate {
      rename => {
        "[event][code]"     => "event_id"
        "[host][name]"      => "hostname"
        "[winlog][channel]" => "log_channel"
        "[winlog][computer_name]" => "computer_name"
      }
      add_field => { "log_source" => "windows" }
    }

    # ─── Enrichissement selon l'Event ID ───
    translate {
      field       => "event_id"
      destination => "event_description"
      dictionary  => {
        "4624"  => "Connexion réussie"
        "4625"  => "Échec de connexion"
        "4634"  => "Déconnexion"
        "4648"  => "Connexion avec credentials explicites"
        "4672"  => "Privilèges spéciaux assignés"
        "4720"  => "Création de compte utilisateur"
        "4726"  => "Suppression de compte utilisateur"
        "4732"  => "Ajout au groupe local"
        "4733"  => "Suppression du groupe local"
        "4756"  => "Ajout au groupe universel"
        "4771"  => "Échec pré-authentification Kerberos"
        "4776"  => "Validation credentials NTLM"
        "7034"  => "Service crashé"
        "7035"  => "Service démarré/arrêté"
        "7036"  => "Changement d'état d'un service"
        "7045"  => "Nouveau service installé"
        "4688"  => "Création de processus"
        "4698"  => "Tâche planifiée créée"
        "4702"  => "Tâche planifiée modifiée"
        "4104"  => "Exécution script PowerShell"
        "4103"  => "Activité module PowerShell"
        "400"   => "PowerShell démarré"
        "600"   => "Provider PowerShell activé"
      }
      fallback => "Événement non catégorisé"
    }

    # ─── Catégorie de sécurité ───
    if [event_id] in ["4624", "4625", "4634", "4648", "4672", "4771", "4776"] {
      mutate { add_field => { "event_category" => "authentication" } }
    } else if [event_id] in ["4720", "4726", "4732", "4733", "4756"] {
      mutate { add_field => { "event_category" => "account_management" } }
    } else if [event_id] in ["7034", "7035", "7036", "7045"] {
      mutate { add_field => { "event_category" => "service" } }
    } else if [event_id] in ["4688", "4698", "4702"] {
      mutate { add_field => { "event_category" => "process" } }
    } else if [event_id] in ["4104", "4103", "400", "600"] {
      mutate { add_field => { "event_category" => "powershell" } }
    } else {
      mutate { add_field => { "event_category" => "other" } }
    }

    # ─── Niveau de criticité ───
    if [event_id] in ["4625", "4771", "7045", "4698", "4720"] {
      mutate { add_field => { "severity" => "high" } }
    } else if [event_id] in ["4648", "4672", "4688", "4104"] {
      mutate { add_field => { "severity" => "medium" } }
    } else {
      mutate { add_field => { "severity" => "low" } }
    }
  }
}

output {
  if "winlogbeat" in [tags] {
    elasticsearch {
      hosts    => ["http://elasticsearch:9200"]
      index    => "windows-logs-%{+YYYY.MM.dd}"
      user  => "elastic"       # décommenter si auth activée
      password => "changeme"
      action   => "create"
    }
  }
}
