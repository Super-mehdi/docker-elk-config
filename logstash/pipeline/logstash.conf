input {
	beats {
		port => 5044
	}
	tcp {
		port => 50000
	}
}

filter {
	if [type] == "syslog" or [fields][log_type] == "linux_auth" {
		grok {
			match => {
				"message" => [
					# SSH authentication
					"%{SYSLOGTIMESTAMP:syslog_timestamp} %{HOSTNAME:host_name} %{WORD:process}\[%{NUMBER:pid}\]: %{GREEDYDATA:syslog_message}",
					# Fallback
					"%{GREEDYDATA:syslog_message}"
				]
			}
			tag_on_failure => ["_grokparsefailure_syslog"]
		}

		# Parse the syslog timestamp
		date {
			match => ["syslog_timestamp", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss"]
			target => "@timestamp"
			timezone => "UTC"
		}

		# Detect brute force / intrusion patterns
		if [syslog_message] =~ /Failed password/ {
			mutate {
				add_tag => ["auth_failure", "possible_brute_force"]
				add_field => { "event_type" => "authentication_failure" }
			}
		}

		if [syslog_message] =~ /Accepted password|Accepted publickey/ {
			mutate {
				add_tag => ["auth_success"]
				add_field => { "event_type" => "authentication_success" }
			}
		}

		if [syslog_message] =~ /sudo/ {
			mutate {
				add_tag => ["sudo_usage"]
				add_field => { "event_type" => "privilege_escalation_attempt" }
			}
		}

		if [syslog_message] =~ /Invalid user/ {
			mutate {
				add_tag => ["invalid_user"]
				add_field => { "event_type" => "unknown_user_attempt" }
			}
		}
	}
}

output {
	elasticsearch {
		hosts => "elasticsearch:9200"
		user => "elastic"
		password => "changeme"
	}
}
